<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevate Studio Flow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Elevate Studio Flow</div>
    <nav>
      <a href="#services">Services</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
  <h1>We design modern websites that help your business grow</h1>
  <p>Elevate Studio Flow provides web design, development, and branding solutions tailored for modern businesses.</p>
  <button onclick="scrollToContact()">Start Free Trial</button>
</section>

  <!-- Services -->
  <section id="services">
    <h2>Services</h2>
    <div class="cards">
      <div class="card">Web Design</div>
      <div class="card">Development</div>
      <div class="card">Branding</div>
    </div>
  </section>

  <!-- Pricing -->
  <section id="pricing">
    <h2>Pricing</h2>
    <div class="cards">
      <div class="card">Basic</div>
      <div class="card">Standard</div>
      <div class="card">Premium</div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact">
    <h2>Contact</h2>
    <form>
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <script>
    function scrollToContact() {
      document.getElementById("contact").scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
